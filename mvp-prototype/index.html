<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANGAM — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>SANGAM</h1>
      <p>Samanvay SANGAM — Support Tracking System</p>
      <form onsubmit="event.preventDefault(); window.location.href='app.html';">
        <div class="form-group">
          <label>Frappe Server URL</label>
          <input type="text" value="http://sangam.local:8000" />
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="text" placeholder="Enter your API key" />
        </div>
        <div class="form-group">
          <label>API Secret</label>
          <input type="password" placeholder="Enter your API secret" />
        </div>
        <button class="btn btn-primary w-full" type="submit" style="width:100%;justify-content:center;padding:10px;margin-top:8px">Login</button>
      </form>
      <div style="margin-top:16px;text-align:center">
        <small style="color:#64748b">Token-based authentication &middot; Frappe v2 API</small>
      </div>
    </div>
  </div>
</body>
</html>
