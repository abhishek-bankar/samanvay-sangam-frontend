<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Detail — Samanvay SANGAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <div id="app-header"></div>
    <main class="main-content" id="main-content"></main>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function() {
      var role = getCurrentRole();
      var projectId = getCurrentProjectId();
      var batchId = getUrlParam('batch');

      // Render header
      renderHeader({ showProjectBanner: true, showTabs: true, activeTab: 'Batches' });

      var main = document.getElementById('main-content');

      // Find the batch
      var batch = BATCHES.find(function(b) { return b.id === batchId; });
      if (!batch) {
        main.innerHTML = '<div class="empty-state">' +
          '<div class="empty-state-icon">&#128466;</div>' +
          '<div class="empty-state-text">Batch not found.</div>' +
          '<div class="mt-3"><a href="batches.html?project=' + projectId + '" class="btn btn-primary">Back to Batches</a></div>' +
          '</div>';
        return;
      }

      var supports = getBatchSupports(batchId);
      var progress = getBatchProgress(batchId);
      var isClient = role === 'Client';

      var html = '';

      // Back link
      html += '<div class="mb-4"><a href="batches.html?project=' + projectId + '" class="text-sm text-secondary">&larr; Back to Batches</a></div>';

      // Batch info card
      html += '<div class="card mb-4">';
      html += '<div class="card-header"><span class="card-title">' + escapeHtml(batch.name) + '</span>' + batchStatusBadge(batch.status) + '</div>';
      html += '<div class="separator"></div>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem">';
      html += '<div><span class="text-xs text-secondary block">Batch ID</span><span class="text-sm font-semibold">' + escapeHtml(batch.id) + '</span></div>';
      html += '<div><span class="text-xs text-secondary block">Submitted By</span><span class="text-sm font-semibold">' + escapeHtml(getUserName(batch.submittedBy)) + '</span></div>';
      html += '<div><span class="text-xs text-secondary block">Submitted Date</span><span class="text-sm font-semibold">' + formatDate(batch.submittedAt) + '</span></div>';
      html += '<div><span class="text-xs text-secondary block">Completed Date</span><span class="text-sm font-semibold">' + (batch.completedAt ? formatDate(batch.completedAt) : '—') + '</span></div>';
      html += '</div>';

      // Trigger Extraction button — PM only, batch status "New"
      if (role === 'PM' && batch.status === 'New') {
        html += '<div class="separator"></div>';
        html += '<div class="flex items-center gap-3">';
        html += '<button class="btn btn-primary" onclick="showToast(\'Extraction triggered for batch ' + escapeHtml(batch.id) + '. Navisworks service will pick it up automatically.\', \'success\')">Trigger Navisworks Extraction</button>';
        html += '<span class="text-xs text-secondary">Sends this batch to the automated extraction queue. The Navisworks service will process it automatically.</span>';
        html += '</div>';
      }

      html += '</div>';

      // Progress section
      var pct = progress.percentage;
      var progressClass = pct >= 75 ? 'success' : (pct >= 40 ? 'warning' : '');
      html += '<div class="card mb-4">';
      html += '<div class="card-header"><span class="card-title">Progress</span></div>';
      html += '<div class="flex items-center justify-between mb-2">';
      html += '<span class="text-sm text-secondary">' + progress.completed + ' of ' + progress.total + ' supports completed (' + pct + '%)</span>';
      html += '</div>';
      html += '<div class="progress-bar-container" style="height:0.75rem">';
      html += '<div class="progress-bar-fill ' + progressClass + '" style="width:' + pct + '%"></div>';
      html += '</div>';
      html += '</div>';

      // Duplicate detection section
      var duplicateSupports = supports.filter(function(s) { return s.isDuplicate; });
      if (duplicateSupports.length > 0) {
        html += '<div class="card mb-4">';
        html += '<div class="card-header"><span class="card-title text-warning">Duplicate Detection</span></div>';
        html += '<div class="flex flex-col gap-2">';
        duplicateSupports.forEach(function(s) {
          // Find the original batch info
          var origBatchId = s.duplicateOf;
          var origBatch = BATCHES.find(function(b) { return b.id === origBatchId; });
          html += '<div class="duplicate-flag">';
          html += '<span class="duplicate-flag-icon">&#9888;</span>';
          html += '<div><strong>' + escapeHtml(s.tagId) + '</strong> was previously found in batch ' + escapeHtml(origBatchId) +
            ' (current status: ' + escapeHtml(s.status) + ', revision: ' + escapeHtml(s.revision) + ')</div>';
          html += '</div>';
        });
        html += '</div>';
        html += '</div>';
      }

      // Support breakdown table
      html += '<div class="card" style="padding:0">';
      html += '<div style="padding:1rem 1.25rem"><span class="card-title">Support Breakdown</span></div>';
      html += '<div id="supports-table"></div>';
      html += '</div>';

      main.innerHTML = html;

      // Build columns for supports table
      var columns = [
        {
          header: 'Support Tag ID',
          accessor: 'tagId',
          render: function(val, row) {
            return '<a href="support-detail.html?project=' + projectId + '&support=' + row.id + '">' + escapeHtml(val) + '</a>';
          }
        },
        {
          header: 'Status',
          accessor: 'status',
          render: function(val) { return statusBadge(val); }
        },
        {
          header: 'Revision',
          accessor: 'revision',
          render: function(val) { return '<span class="font-mono text-sm">' + escapeHtml(val) + '</span>'; }
        }
      ];

      // Assigned To column hidden for Client role
      if (!isClient) {
        columns.push({
          header: 'Assigned To',
          accessor: 'assignedTo',
          render: function(val) { return escapeHtml(getUserName(val)); }
        });
      }

      columns.push({
        header: 'TAT (days)',
        accessor: 'turnaroundDays',
        render: function(val) { return val !== null ? val : '—'; }
      });

      createTable('supports-table', {
        columns: columns,
        data: supports,
        defaultSort: 'tagId',
        defaultSortDir: 'asc',
        pageSize: 20
      });
    })();
  </script>
</body>
</html>
