<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Detail — Samanvay SANGAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <div id="app-header"></div>
    <main class="main-content" id="main-content"></main>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function() {
      const projectId = getCurrentProjectId();
      const project = getCurrentProject();
      const role = getCurrentRole();
      const supportId = getUrlParam('support');

      // Render header with project banner and tabs
      renderHeader({ showProjectBanner: true, showTabs: true, activeTab: 'Support Register' });

      const main = document.getElementById('main-content');

      // Find the support
      const support = SUPPORTS.find(s => s.id === supportId);
      if (!support) {
        main.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128269;</div><div class="empty-state-text">Support not found.</div><div class="mt-3"><a href="supports.html?project=' + projectId + '" class="btn btn-primary">Back to Support Register</a></div></div>';
        return;
      }

      const comments = getSupportComments(supportId);
      const internalComments = comments.filter(c => c.type === 'internal');
      const externalComments = comments.filter(c => c.type === 'external');
      const revisions = getSupportRevisions(supportId);
      const logs = getSupportLogs(supportId);
      const isClient = role === 'Client';

      let html = '';

      // ===== Top Section =====
      html += '<div class="flex items-center gap-3 mb-2" style="flex-wrap:wrap;">';
      html += '<h1 class="page-title" style="margin-bottom:0;">' + escapeHtml(support.tagId) + '</h1>';
      html += '<span class="badge badge-lg ' + (STATUS_BADGE_CLASS[support.status] || '') + '">' + escapeHtml(support.status) + '</span>';
      html += '<span class="badge badge-lg" style="background:var(--color-bg-subtle);color:var(--color-text-secondary);border-color:var(--color-border);">Rev ' + escapeHtml(support.revision) + '</span>';
      if (support.isDuplicate) {
        html += '<span class="badge badge-lg" style="background:var(--color-warning-light);color:var(--color-warning);border-color:var(--color-warning);">&#9888; Duplicate</span>';
      }
      html += '</div>';

      html += '<div class="flex items-center gap-3 mb-4 text-sm text-secondary" style="flex-wrap:wrap;">';
      html += '<span>Batch: <a href="supports.html?project=' + projectId + '">' + escapeHtml(support.batchId) + '</a></span>';
      html += '<span style="color:var(--color-border);">|</span>';
      html += '<span>DWG: <span class="font-mono">' + escapeHtml(support.dwgFile || '—') + '</span></span>';
      html += '<span style="color:var(--color-border);">|</span>';
      html += '<span>ID: <span class="font-mono">' + escapeHtml(support.id) + '</span></span>';
      html += '</div>';

      // ===== Info Grid =====
      html += '<div class="card mb-4"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;">';

      if (!isClient) {
        html += '<div><div class="text-xs text-muted mb-1">Assigned To</div><div class="text-sm font-semibold">' + escapeHtml(getUserName(support.assignedTo)) + '</div></div>';
        html += '<div><div class="text-xs text-muted mb-1">Assigned By</div><div class="text-sm font-semibold">' + escapeHtml(getUserName(support.assignedBy)) + '</div></div>';
      }
      html += '<div><div class="text-xs text-muted mb-1">Assigned Date</div><div class="text-sm font-semibold">' + formatDate(support.assignedAt) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Submitted Date</div><div class="text-sm font-semibold">' + formatDate(support.submittedAt) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">TAT (days)</div><div class="text-sm font-semibold">' + (support.turnaroundDays !== null && support.turnaroundDays !== undefined ? support.turnaroundDays : '—') + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Created Date</div><div class="text-sm font-semibold">' + formatDate(support.createdAt) + '</div></div>';

      html += '</div></div>';

      // ===== Content Tabs =====
      var tabDefs = [];
      tabDefs.push({ id: 'details', label: 'Details' });
      if (!isClient) {
        tabDefs.push({ id: 'internal-comments', label: 'Internal Comments' });
      }
      tabDefs.push({ id: 'external-comments', label: 'External Comments' });
      tabDefs.push({ id: 'revision-history', label: 'Revision History' });
      tabDefs.push({ id: 'activity-log', label: 'Activity Log' });

      html += '<div class="content-tabs">';
      tabDefs.forEach(function(tab, idx) {
        html += '<button class="content-tab' + (idx === 0 ? ' active' : '') + '" data-tab="' + tab.id + '">' + tab.label + '</button>';
      });
      html += '</div>';

      // --- Tab Panel: Details ---
      html += '<div class="tab-panel active" id="panel-details">';
      html += '<div class="card">';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;">';
      html += '<div><div class="text-xs text-muted mb-1">Support Tag ID</div><div class="text-sm font-semibold">' + escapeHtml(support.tagId) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Internal ID</div><div class="text-sm font-mono">' + escapeHtml(support.id) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Project</div><div class="text-sm">' + escapeHtml(project.name) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Batch</div><div class="text-sm">' + escapeHtml(support.batchId) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Status</div><div>' + statusBadge(support.status) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Revision</div><div class="text-sm font-semibold">Rev ' + escapeHtml(support.revision) + '</div></div>';
      if (!isClient) {
        html += '<div><div class="text-xs text-muted mb-1">Assigned To</div><div class="text-sm">' + escapeHtml(getUserName(support.assignedTo)) + '</div></div>';
        html += '<div><div class="text-xs text-muted mb-1">Assigned By</div><div class="text-sm">' + escapeHtml(getUserName(support.assignedBy)) + '</div></div>';
      }
      html += '<div><div class="text-xs text-muted mb-1">Assigned Date</div><div class="text-sm">' + formatDate(support.assignedAt) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Submitted Date</div><div class="text-sm">' + formatDate(support.submittedAt) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">TAT (days)</div><div class="text-sm">' + (support.turnaroundDays !== null && support.turnaroundDays !== undefined ? support.turnaroundDays : '—') + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Created Date</div><div class="text-sm">' + formatDate(support.createdAt) + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">DWG File</div><div class="text-sm font-mono">' + escapeHtml(support.dwgFile || '—') + '</div></div>';
      html += '<div><div class="text-xs text-muted mb-1">Duplicate</div><div class="text-sm">' + (support.isDuplicate ? 'Yes (from ' + escapeHtml(support.duplicateOf) + ')' : 'No') + '</div></div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';

      // --- Tab Panel: Internal Comments (hidden for Client) ---
      if (!isClient) {
        html += '<div class="tab-panel" id="panel-internal-comments">';
        if (internalComments.length === 0) {
          html += '<div class="empty-state"><div class="empty-state-icon">&#128172;</div><div class="empty-state-text">No internal comments yet.</div></div>';
        } else {
          html += '<div class="comment-thread">';
          internalComments.forEach(function(c) {
            html += '<div class="comment internal">';
            html += '<div class="comment-header">';
            html += '<div class="flex items-center gap-2"><span class="comment-author">' + escapeHtml(c.author) + '</span>' + roleBadge(c.authorRole) + '</div>';
            html += '<span class="comment-date">' + formatDate(c.createdAt) + '</span>';
            html += '</div>';
            html += '<div class="comment-body">' + escapeHtml(c.content) + '</div>';
            html += '</div>';
          });
          html += '</div>';
        }
        // Add comment form
        html += '<div class="separator"></div>';
        html += '<div class="card">';
        html += '<div class="form-group"><label class="form-label">Add Internal Comment</label>';
        html += '<textarea class="form-textarea" id="internal-comment-input" placeholder="Write an internal comment..."></textarea></div>';
        html += '<div class="flex justify-end"><button class="btn btn-primary" onclick="submitInternalComment()">Submit Comment</button></div>';
        html += '</div>';
        html += '</div>';
      }

      // --- Tab Panel: External Comments ---
      html += '<div class="tab-panel" id="panel-external-comments">';
      if (externalComments.length === 0) {
        html += '<div class="empty-state"><div class="empty-state-icon">&#128172;</div><div class="empty-state-text">No external comments yet.</div></div>';
      } else {
        html += '<div class="comment-thread">';
        externalComments.forEach(function(c) {
          html += '<div class="comment external">';
          html += '<div class="comment-header">';
          html += '<div class="flex items-center gap-2"><span class="comment-author">' + escapeHtml(c.author) + '</span>' + roleBadge(c.authorRole) + '</div>';
          html += '<span class="comment-date">' + formatDate(c.createdAt) + '</span>';
          html += '</div>';
          html += '<div class="comment-body">' + escapeHtml(c.content) + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }
      // Add comment form (visible to PM, SME, Client)
      if (['PM', 'SME', 'Client'].includes(role)) {
        html += '<div class="separator"></div>';
        html += '<div class="card">';
        html += '<div class="form-group"><label class="form-label">Add External Comment</label>';
        html += '<textarea class="form-textarea" id="external-comment-input" placeholder="Write an external comment..."></textarea></div>';
        html += '<div class="flex justify-end"><button class="btn btn-primary" onclick="submitExternalComment()">Submit Comment</button></div>';
        html += '</div>';
      }
      html += '</div>';

      // --- Tab Panel: Revision History ---
      html += '<div class="tab-panel" id="panel-revision-history">';
      if (revisions.length === 0) {
        html += '<div class="empty-state"><div class="empty-state-icon">&#128196;</div><div class="empty-state-text">No revision history.</div></div>';
      } else {
        html += '<div class="timeline">';
        revisions.forEach(function(rev) {
          html += '<div class="timeline-item">';
          html += '<div class="timeline-content"><strong>Rev ' + escapeHtml(rev.revision) + '</strong> — ' + escapeHtml(rev.trigger) + '</div>';
          html += '<div class="timeline-date">' + formatDate(rev.createdAt) + '</div>';
          html += '<div class="timeline-user font-mono" style="margin-top:0.25rem;">' + escapeHtml(rev.dwgFile) + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }
      html += '</div>';

      // --- Tab Panel: Activity Log ---
      html += '<div class="tab-panel" id="panel-activity-log">';
      if (logs.length === 0) {
        html += '<div class="empty-state"><div class="empty-state-icon">&#128203;</div><div class="empty-state-text">No activity recorded.</div></div>';
      } else {
        html += '<div class="timeline">';
        logs.forEach(function(log) {
          html += '<div class="timeline-item">';
          html += '<div class="timeline-content">' + escapeHtml(log.action);
          if (log.fromStatus || log.toStatus) {
            html += ' &nbsp;';
            if (log.fromStatus) {
              html += statusBadge(log.fromStatus);
              html += ' <span class="text-muted">&rarr;</span> ';
            }
            if (log.toStatus) {
              html += statusBadge(log.toStatus);
            }
          }
          html += '</div>';
          html += '<div class="timeline-user">' + escapeHtml(log.user) + ' ' + roleBadge(log.userRole) + '</div>';
          html += '<div class="timeline-date">' + formatDate(log.timestamp) + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }
      html += '</div>';

      main.innerHTML = html;

      // ===== Tab Switching =====
      document.querySelectorAll('.content-tab').forEach(function(tabBtn) {
        tabBtn.addEventListener('click', function() {
          // Remove active from all tabs and panels
          document.querySelectorAll('.content-tab').forEach(function(t) { t.classList.remove('active'); });
          document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
          // Activate clicked tab and its panel
          tabBtn.classList.add('active');
          var panelId = 'panel-' + tabBtn.getAttribute('data-tab');
          var panel = document.getElementById(panelId);
          if (panel) panel.classList.add('active');
        });
      });
    })();

    // ===== Comment Submit Handlers =====
    function submitInternalComment() {
      var input = document.getElementById('internal-comment-input');
      if (!input || !input.value.trim()) {
        showToast('Please enter a comment.', 'error');
        return;
      }
      showToast('Internal comment submitted (mock).', 'success');
      input.value = '';
    }

    function submitExternalComment() {
      var input = document.getElementById('external-comment-input');
      if (!input || !input.value.trim()) {
        showToast('Please enter a comment.', 'error');
        return;
      }
      showToast('External comment submitted (mock).', 'success');
      input.value = '';
    }
  </script>
</body>
</html>
