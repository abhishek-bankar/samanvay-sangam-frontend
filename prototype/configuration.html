<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuration — Samanvay SANGAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">
    <div id="app-header"></div>
    <main class="main-content" id="main-content"></main>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/charts.js"></script>
  <script>
    (function() {
      const project = getCurrentProject();
      const projectId = project.id;

      // Render header
      renderHeader({ showProjectBanner: true, showTabs: true, activeTab: 'Configuration' });

      // Access check
      if (!checkRoleAccess(['PM'])) return;

      const mainContent = document.getElementById('main-content');
      const supports = getProjectSupports(projectId);
      const batches = getProjectBatches(projectId);

      // Compute metrics
      const totalBatches = batches.length;
      const totalSupports = supports.length;
      const activeActioneeIds = new Set(supports.filter(s => s.assignedTo).map(s => s.assignedTo));
      const activeActionees = activeActioneeIds.size;
      const supportsWithTat = supports.filter(s => s.turnaroundDays != null);
      const avgTat = supportsWithTat.length > 0
        ? Math.round(supportsWithTat.reduce((sum, s) => sum + s.turnaroundDays, 0) / supportsWithTat.length)
        : 0;

      // Team members
      const pm = USERS.find(u => u.id === project.pmId);
      const smes = project.smeIds.map(id => USERS.find(u => u.id === id)).filter(Boolean);
      const actionees = project.actioneeIds.map(id => USERS.find(u => u.id === id)).filter(Boolean);

      // Phase options
      const phases = ['Concept Design', 'Front-End Engineering', 'Detailed Engineering'];
      const statuses = ['Planning', 'Active', 'On Hold', 'Completed'];

      let html = `
        <h1 class="page-title">Configuration</h1>
        <p class="page-subtitle">Manage project settings, team, and view metrics for ${escapeHtml(project.name)}</p>
        <div class="card-grid">
      `;

      // Card 1: Project Settings
      html += `
        <div class="card">
          <div class="card-header">
            <span class="card-title">Project Settings</span>
          </div>
          <form id="project-settings-form" onsubmit="return saveProjectSettings(event)">
            <div class="form-group">
              <label class="form-label">Project Name</label>
              <input type="text" class="form-input" id="cfg-project-name" value="${escapeHtml(project.name)}">
            </div>
            <div class="form-group">
              <label class="form-label">Client Name</label>
              <input type="text" class="form-input" id="cfg-client-name" value="${escapeHtml(project.client)}">
            </div>
            <div class="form-group">
              <label class="form-label">Phase</label>
              <select class="form-select" id="cfg-phase">
                ${phases.map(p => `<option value="${p}" ${p === project.phase ? 'selected' : ''}>${p}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-select" id="cfg-status">
                ${statuses.map(s => `<option value="${s}" ${s === project.status ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-full">Save Settings</button>
          </form>
        </div>`;

      // Card 2: Team Management
      html += `
        <div class="card">
          <div class="card-header">
            <span class="card-title">Team Management</span>
            <button class="btn btn-sm btn-primary" onclick="showAddMemberModal()">Add Team Member</button>
          </div>
          <div class="mb-3">
            <div class="text-xs text-secondary font-semibold mb-2" style="text-transform:uppercase;letter-spacing:0.05em">Project Manager(s)</div>
            <div class="flex flex-col gap-1">
              ${pm ? `<div class="flex items-center gap-2 p-2 bg-muted rounded"><span class="text-sm font-medium">${escapeHtml(pm.name)}</span>${roleBadge('PM')}</div>` : '<div class="text-sm text-muted">None assigned</div>'}
            </div>
          </div>
          <div class="mb-3">
            <div class="text-xs text-secondary font-semibold mb-2" style="text-transform:uppercase;letter-spacing:0.05em">SME(s)</div>
            <div class="flex flex-col gap-1">
              ${smes.length > 0 ? smes.map(s => `<div class="flex items-center gap-2 p-2 bg-muted rounded"><span class="text-sm font-medium">${escapeHtml(s.name)}</span>${roleBadge('SME')}</div>`).join('') : '<div class="text-sm text-muted">None assigned</div>'}
            </div>
          </div>
          <div>
            <div class="text-xs text-secondary font-semibold mb-2" style="text-transform:uppercase;letter-spacing:0.05em">Actionees</div>
            <div class="flex flex-col gap-1">
              ${actionees.length > 0 ? actionees.map(a => `<div class="flex items-center gap-2 p-2 bg-muted rounded"><span class="text-sm font-medium">${escapeHtml(a.name)}</span>${roleBadge('Actionee')}</div>`).join('') : '<div class="text-sm text-muted">None assigned</div>'}
            </div>
          </div>
        </div>`;

      // Card 3: Project Metrics
      html += `
        <div class="card">
          <div class="card-header">
            <span class="card-title">Project Metrics</span>
          </div>
          <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between p-3 bg-muted rounded">
              <span class="text-sm text-secondary">Total Batches</span>
              <span class="text-lg font-bold">${totalBatches}</span>
            </div>
            <div class="flex items-center justify-between p-3 bg-muted rounded">
              <span class="text-sm text-secondary">Total Supports</span>
              <span class="text-lg font-bold">${totalSupports}</span>
            </div>
            <div class="flex items-center justify-between p-3 bg-muted rounded">
              <span class="text-sm text-secondary">Active Actionees</span>
              <span class="text-lg font-bold">${activeActionees}</span>
            </div>
            <div class="flex items-center justify-between p-3 bg-muted rounded">
              <span class="text-sm text-secondary">Average TAT</span>
              <span class="text-lg font-bold">${avgTat} days</span>
            </div>
          </div>
        </div>`;

      html += '</div>'; // close card-grid

      mainContent.innerHTML = html;
    })();

    // --- Action Handlers ---
    function saveProjectSettings(e) {
      e.preventDefault();
      showToast('Project settings saved successfully');
      return false;
    }

    function showAddMemberModal() {
      showModal(
        'Add Team Member',
        `<div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-input" id="new-member-name" placeholder="Enter team member name">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-select" id="new-member-role">
            <option value="PM">Project Manager</option>
            <option value="SME">SME</option>
            <option value="Actionee" selected>Actionee</option>
          </select>
        </div>`,
        `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
         <button class="btn btn-primary" onclick="addTeamMember()">Add</button>`
      );
    }

    function addTeamMember() {
      const name = document.getElementById('new-member-name').value.trim();
      const role = document.getElementById('new-member-role').value;
      if (!name) {
        document.getElementById('new-member-name').style.borderColor = 'var(--color-error)';
        document.getElementById('new-member-name').focus();
        return;
      }
      closeModal();
      showToast(name + ' added as ' + role);
    }
  </script>
</body>
</html>
